name: to-avocado

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set short Git SHA
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tickets-backend:${{ env.SHORT_SHA }}

  deploy:
    name: Deploy to Ubuntu Server
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set short Git SHA for deploy
        id: vars
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create .env file for Docker
        run: |
          echo "TAG=${{ env.SHORT_SHA }}" > .env
          
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          
          echo "ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}" >> .env
          
          echo "VAKHTANGOV_API_KEY=${{ secrets.VAKHTANGOV_API_KEY }}" >> .env
          echo "RAMT_API_KEY=${{ secrets.RAMT_API_KEY }}" >> .env
          echo "NATIONS_API_KEY=${{ secrets.NATIONS_API_KEY }}" >> .env
          echo "FOMENKI_API_KEY=${{ secrets.FOMENKI_API_KEY }}" >> .env
          echo "LENSOV_API_KEY=${{ secrets.LENSOV_API_KEY }}" >> .env          
          echo "MXT_API_KEY=${{ secrets.MXT_API_KEY }}" >> .env          
          echo "SATIRIKON_API_KEY=${{ secrets.SATIRIKON_API_KEY }}" >> .env          
          
          echo "BOT_TOKEN_VAKHTANGOV=${{ secrets.BOT_TOKEN_VAKHTANGOV }}" >> .env
          echo "BOT_TOKEN_RAMT=${{ secrets.BOT_TOKEN_RAMT }}" >> .env
          echo "BOT_TOKEN_NATIONS=${{ secrets.BOT_TOKEN_NATIONS }}" >> .env
          echo "BOT_TOKEN_FOMENKI=${{ secrets.BOT_TOKEN_FOMENKI }}" >> .env
          echo "BOT_TOKEN_LENSOV=${{ secrets.BOT_TOKEN_LENSOV }}" >> .env
          echo "BOT_TOKEN_MXT=${{ secrets.BOT_TOKEN_MXT }}" >> .env
          echo "BOT_TOKEN_SATIRIKON=${{ secrets.BOT_TOKEN_SATIRIKON }}" >> .env
          
          echo "BOT_WEBHOOK_URL_VAKHTANGOV=${{ secrets.BOT_WEBHOOK_URL_VAKHTANGOV }}" >> .env
          echo "BOT_WEBHOOK_SECRET_VAKHTANGOV=${{ secrets.BOT_WEBHOOK_SECRET_VAKHTANGOV }}" >> .env
          echo "BOT_WEBHOOK_URL_FOMENKI=${{ secrets.BOT_WEBHOOK_URL_FOMENKI }}" >> .env
          echo "BOT_WEBHOOK_SECRET_FOMENKI=${{ secrets.BOT_WEBHOOK_SECRET_FOMENKI }}" >> .env
          echo "BOT_WEBHOOK_URL_NATIONS=${{ secrets.BOT_WEBHOOK_URL_NATIONS }}" >> .env
          echo "BOT_WEBHOOK_SECRET_NATIONS=${{ secrets.BOT_WEBHOOK_SECRET_NATIONS }}" >> .env
          echo "BOT_WEBHOOK_URL_RAMT=${{ secrets.BOT_WEBHOOK_URL_RAMT }}" >> .env
          echo "BOT_WEBHOOK_SECRET_RAMT=${{ secrets.BOT_WEBHOOK_SECRET_RAMT }}" >> .env        
          echo "BOT_WEBHOOK_URL_LENSOV=${{ secrets.BOT_WEBHOOK_URL_LENSOV }}" >> .env
          echo "BOT_WEBHOOK_SECRET_LENSOV=${{ secrets.BOT_WEBHOOK_SECRET_LENSOV }}" >> .env
          echo "BOT_WEBHOOK_URL_MXT=${{ secrets.BOT_WEBHOOK_URL_MXT }}" >> .env
          echo "BOT_WEBHOOK_SECRET_MXT=${{ secrets.BOT_WEBHOOK_SECRET_MXT }}" >> .env
          echo "BOT_WEBHOOK_URL_SATIRIKON=${{ secrets.BOT_WEBHOOK_URL_SATIRIKON }}" >> .env
          echo "BOT_WEBHOOK_SECRET_SATIRIKON=${{ secrets.BOT_WEBHOOK_SECRET_SATIRIKON }}" >> .env
          
          echo "TELEGRAM_API_KEY=${{ secrets.TELEGRAM_API_KEY }}" >> .env
          echo "TELEGRAM_API_URL=${{ secrets.TELEGRAM_API_URL }}" >> .env

      - name: copy files to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST_IP }}
          username: ${{ secrets.DEPLOY_HOST_USERNAME }}
          key: ${{ secrets.DEPLOY_HOST_KEY }}
          source: ".env, docker-compose.yml"
          target: ${{ secrets.DEPLOY_HOST_PROJECT_PATH }}

      - name: docker pull && up
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST_IP }}
          username: ${{ secrets.DEPLOY_HOST_USERNAME }}
          key: ${{ secrets.DEPLOY_HOST_KEY }}
          script: |
            echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            cd ${{ secrets.DEPLOY_HOST_PROJECT_PATH }}
            docker compose pull
            docker compose up -d